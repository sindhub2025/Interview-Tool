name: Build Windows EXE

on:
  push:
    branches: [ main ]
    tags: [ "v*" ]
  pull_request:

permissions:
  contents: write

jobs:
  build-windows-exe:
    runs-on: windows-latest
    strategy:
      matrix:
        python-version: [3.12]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        shell: pwsh
        run: |
          Set-Location $env:GITHUB_WORKSPACE
          python -m pip install --upgrade pip
          pip install -r requirements_windows.txt
          pip install pyinstaller

      - name: Build EXE with PyInstaller
        shell: pwsh
        run: |
          Set-Location $env:GITHUB_WORKSPACE
          $specPath = Join-Path $env:GITHUB_WORKSPACE 'InterviewTool.spec'
          pyinstaller --noconfirm --clean $specPath

      - name: Upload EXE artifact
        uses: actions/upload-artifact@v4
        with:
          name: InterviewTool-windows-exe-${{ github.run_number }}
          path: dist/InterviewTool.exe

      - name: Package release ZIP
        if: startsWith(github.ref, 'refs/tags/')
        shell: pwsh
        run: |
          Set-Location $env:GITHUB_WORKSPACE
          Compress-Archive -Path dist/InterviewTool.exe -DestinationPath dist/InterviewTool-${{ github.ref_name }}-windows-x64.zip

      - name: Publish GitHub Release Asset
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/InterviewTool-${{ github.ref_name }}-windows-x64.zip
