name: Build Windows EXE

on:
  push:
    branches: [ main ]
    tags: [ "v*" ]
  pull_request:

permissions:
  contents: write

concurrency:
  group: windows-exe-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-windows-exe:
    runs-on: windows-latest
    strategy:
      matrix:
        python-version: [3.12]

    steps:
      - uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          architecture: x64
          cache: pip
          cache-dependency-path: |
            requirements_windows.txt
            ghostmic/requirements_windows.txt

      - name: Install dependencies
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $sw = [System.Diagnostics.Stopwatch]::StartNew()
          python -m pip install --upgrade pip
          pip install -r requirements_windows.txt
          pip install pyinstaller
          $sw.Stop()
          Write-Host "Dependency install time: $($sw.Elapsed.ToString())"

      - name: Build EXE with PyInstaller (PR fast path)
        if: github.event_name == 'pull_request'
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $sw = [System.Diagnostics.Stopwatch]::StartNew()
          pyinstaller --noconfirm InterviewTool.spec
          $sw.Stop()
          Write-Host "PyInstaller build time (PR): $($sw.Elapsed.ToString())"

      - name: Build EXE with PyInstaller (clean for main/tags)
        if: github.event_name != 'pull_request'
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $sw = [System.Diagnostics.Stopwatch]::StartNew()
          pyinstaller --noconfirm --clean InterviewTool.spec
          $sw.Stop()
          Write-Host "PyInstaller build time (main/tag): $($sw.Elapsed.ToString())"

      - name: Validate EXE output
        shell: pwsh
        run: |
          if (-not (Test-Path 'dist/InterviewTool.exe')) {
            Write-Error 'Build output missing: dist/InterviewTool.exe'
            exit 1
          }

      - name: Upload EXE artifact
        uses: actions/upload-artifact@v5
        with:
          name: InterviewTool-windows-exe-${{ github.run_number }}
          path: dist/InterviewTool.exe

      - name: Package release ZIP
        if: startsWith(github.ref, 'refs/tags/')
        shell: pwsh
        run: |
          Compress-Archive -Path dist/InterviewTool.exe -DestinationPath dist/InterviewTool-${{ github.ref_name }}-windows-x64.zip

      - name: Publish GitHub Release Asset
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/InterviewTool-${{ github.ref_name }}-windows-x64.zip
