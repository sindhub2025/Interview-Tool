name: Build Windows EXE

on:
  push:
    branches: [ main ]
    tags: [ "v*" ]
  pull_request:

permissions:
  contents: write

jobs:
  build-windows-exe:
    runs-on: windows-latest
    strategy:
      matrix:
        python-version: [3.12]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        shell: pwsh
        run: |
          Set-Location $env:GITHUB_WORKSPACE
          python -m pip install --upgrade pip
          pip install -r requirements_windows.txt
          pip install pyinstaller

      - name: Generate PyInstaller spec
        shell: pwsh
        run: |
          $specPath = Join-Path $env:GITHUB_WORKSPACE 'InterviewTool.spec'
          $specLines = @(
            '# -*- mode: python ; coding: utf-8 -*-',
            '',
            'from PyInstaller.utils.hooks import collect_submodules',
            '',
            '',
            'hiddenimports = [',
            '    "PyQt6.QtCore",',
            '    "PyQt6.QtGui",',
            '    "PyQt6.QtWidgets",',
            '    "torch",',
            '    "torchaudio",',
            '    "faster_whisper",',
            '    "pyaudiowpatch",',
            '    "pynput",',
            '    "sounddevice",',
            '    "groq",',
            '    "requests",',
            ']',
            '',
            'hiddenimports += collect_submodules("faster_whisper")',
            'hiddenimports += collect_submodules("groq")',
            '',
            'datas = [',
            '    ("ghostmic/assets", "ghostmic/assets"),',
            '    ("ghostmic/config.json", "ghostmic"),',
            ']',
            '',
            '',
            'a = Analysis(',
            '    ["ghostmic/main.py"],',
            '    pathex=["."],',
            '    binaries=[],',
            '    datas=datas,',
            '    hiddenimports=hiddenimports,',
            '    hookspath=[],',
            '    hooksconfig={},',
            '    runtime_hooks=["ghostmic/.pyinstaller/runtime_hook.py"],',
            '    excludes=[],',
            '    noarchive=False,',
            ')',
            '',
            'pyz = PYZ(a.pure)',
            '',
            'exe = EXE(',
            '    pyz,',
            '    a.scripts,',
            '    a.binaries,',
            '    a.datas,',
            '    [],',
            '    name="InterviewTool",',
            '    debug=False,',
            '    bootloader_ignore_signals=False,',
            '    strip=False,',
            '    upx=True,',
            '    upx_exclude=[],',
            '    runtime_tmpdir=None,',
            '    console=False,',
            '    disable_windowed_traceback=False,',
            '    argv_emulation=False,',
            '    target_arch=None,',
            '    codesign_identity=None,',
            '    entitlements_file=None,',
            '    icon="ghostmic/assets/icon.ico",',
            ')'
          )
          $specLines | Set-Content -Path $specPath -Encoding utf8

          if (-not (Test-Path $specPath)) {
            Write-Error "Spec file not found after generation: $specPath"
            exit 1
          }

      - name: Build EXE with PyInstaller
        shell: pwsh
        run: |
          Set-Location $env:GITHUB_WORKSPACE
          $specPath = Join-Path $env:GITHUB_WORKSPACE 'InterviewTool.spec'
          pyinstaller --noconfirm --clean $specPath

      - name: Smoke-test built EXE
        shell: pwsh
        run: |
          Set-Location $env:GITHUB_WORKSPACE
          .\dist\InterviewTool.exe --smoke-test
          if ($LASTEXITCODE -ne 0) {
            Write-Error "Smoke test failed with exit code $LASTEXITCODE"
            exit 1
          }

      - name: Upload EXE artifact
        uses: actions/upload-artifact@v4
        with:
          name: InterviewTool-windows-exe-${{ github.run_number }}
          path: dist/InterviewTool.exe

      - name: Package release ZIP
        if: startsWith(github.ref, 'refs/tags/')
        shell: pwsh
        run: |
          Set-Location $env:GITHUB_WORKSPACE
          Compress-Archive -Path dist/InterviewTool.exe -DestinationPath dist/InterviewTool-${{ github.ref_name }}-windows-x64.zip

      - name: Publish GitHub Release Asset
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/InterviewTool-${{ github.ref_name }}-windows-x64.zip
