name: Build Windows EXE

on:
  push:
    branches: [ main ]
    tags: [ "v*" ]
  pull_request:

permissions:
  contents: write

jobs:
  build-windows-exe:
    runs-on: windows-latest
    strategy:
      matrix:
        python-version: [3.12]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements_windows.txt
          pip install pyinstaller

      - name: Build EXE with PyInstaller
        run: |
          pyinstaller --noconfirm --clean InterviewTool.spec

      - name: Smoke-test built EXE
        run: |
          .\dist\InterviewTool.exe --smoke-test
          if ($LASTEXITCODE -ne 0) {
            Write-Error "Smoke test failed with exit code $LASTEXITCODE"
            exit 1
          }

      - name: Upload EXE artifact
        uses: actions/upload-artifact@v4
        with:
          name: InterviewTool-windows-exe-${{ github.run_number }}
          path: dist/InterviewTool.exe

      - name: Package release ZIP
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          Compress-Archive -Path dist/InterviewTool.exe -DestinationPath dist/InterviewTool-${{ github.ref_name }}-windows-x64.zip

      - name: Publish GitHub Release Asset
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/InterviewTool-${{ github.ref_name }}-windows-x64.zip
